<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Manutenção PAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- LOGIN PAGE -->
        <div id="login-container" class="login-wrapper">
            <div class="login-box">
                <div class="login-header">
                    <i class="bi bi-tools"></i>
                    <h1>PAM</h1>
                    <p>Controle de Manutenção</p>
                </div>
                <form id="login-form">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>
                <p id="login-error" class="alert alert-danger d-none"></p>
                <hr>
                <p class="text-muted text-center small">
                    <strong>Demo:</strong> coordenador@pam.com / senha123
                </p>
            </div>
        </div>

        <!-- DASHBOARD PAGE -->
        <div id="dashboard-container" class="d-none">
            <!-- NAVBAR -->
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">
                        <i class="bi bi-tools"></i> PAM - Controle de Manutenção
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <span class="nav-link text-light">
                                    <i class="bi bi-person-circle"></i> <span id="user-name">Usuário</span>
                                </span>
                            </li>
                            <li class="nav-item">
                                <button id="logout-btn" class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-box-arrow-right"></i> Sair
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- MAIN CONTENT -->
            <div class="container-fluid py-4">
                <!-- ALERTS SECTION -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card border-danger">
                            <div class="card-header bg-danger text-white">
                                <i class="bi bi-exclamation-triangle"></i> Alertas Ativos
                            </div>
                            <div class="card-body">
                                <button id="gerar-alertas-btn" class="btn btn-warning mb-3">
                                    <i class="bi bi-arrow-clockwise"></i> Gerar Alertas
                                </button>
                                <div id="alertas-list"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- EQUIPAMENTOS SECTION -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <i class="bi bi-cpu"></i> Equipamentos
                            </div>
                            <div class="card-body">
                                <button id="add-equipamento-btn" class="btn btn-success mb-3">
                                    <i class="bi bi-plus-circle"></i> Adicionar Equipamento
                                </button>
                                <div id="equipamentos-list"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MANUTENÇÕES SECTION -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header bg-info text-white">
                                <i class="bi bi-wrench"></i> Manutenções
                            </div>
                            <div class="card-body">
                                <button id="add-manutencao-btn" class="btn btn-success mb-3">
                                    <i class="bi bi-plus-circle"></i> Adicionar Manutenção
                                </button>
                                <div id="manutencoes-list"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
